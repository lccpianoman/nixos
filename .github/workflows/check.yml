name: checks

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Flake evaluation
        run: nix flake check --no-build --no-write-lock-file
      - name: ShellCheck rebuild script
        run: nix run nixpkgs#shellcheck -- ./rebuild
      - name: Lint weather script
        run: nix run nixpkgs#ruff -- check hosts/nixnotdix/assets/weather/main.py
